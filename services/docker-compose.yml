      COACHLY_KEYSTORE_PASSWORD: Xd`?6|z9I))!>cF}%2)r3C2tPPGHo8#%
      COACHLY_CORS_ALLOWED_ORIGINS: '*'
      COACHLY_CORS_ALLOWED_METHODS: '*'
      COACHLY_CORS_ALLOWED_HEADERS: '*'
      COACHLY_CORS_ALLOW_CREDENTIALS: false
      COACHLY_CORS_MAX_AGE: 3600
    ports:
      - "8800:8443"
    restart: unless-stopped
