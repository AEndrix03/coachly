    container_name: coachly-exercises-be
    environment:
      COACHLY_DB_URL: jdbc:postgresql://dev.aredegalli.it:5432/coachlys
      COACHLY_DB_USERNAME: postgres
      COACHLY_DB_PASSWORD: igSMLpZajwpRExnOceToecnxbQNoRlaq
      SERVER_PORT: 8080
    expose:
